# blacklight fleet — 3-host minimum for Day 1.
# host-2 = Apache + ModSec + staged PolyShell (Day 2+ layer)
# host-3 = Nginx clean (stack-profile skip demo, Day 4)
# host-4 reserved for Day 2 if attribution arc wants a third data point.
#
# The curator here is LOCAL plumbing only: Flask manifest endpoint + report
# inbox. The long-running Claude-driven investigation loop runs in a
# Managed Agents session (see curator/managed_agents.py).

version: "3.8"

services:
  curator:
    build:
      context: ..
      dockerfile: compose/curator.Dockerfile
    image: blacklight/curator:dev
    container_name: bl-curator
    # Curator HTTP (manifest + health) served on internal :8080 — reachable to
    # fleet hosts over the docker network. Host-port mapping deliberately
    # omitted; probe health via `docker exec bl-curator curl localhost:8080/health`.
    # If local Docker host has docker-proxy available, add `ports: ["18080:8080"]`
    # to expose externally for operator curl / demo screen capture.
    volumes:
      - ../curator/storage:/app/curator/storage
      - curator-inbox:/app/inbox
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    networks:
      - fleet
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  host-2:
    build:
      context: ..
      dockerfile: compose/host-apache.Dockerfile
    image: blacklight/host-apache:dev
    container_name: bl-host-2
    hostname: host-2
    volumes:
      # Magento-realistic exhibit placement — mirrors HANDOFF §Day 1 step 4
      # and EXHIBITS.md:33 canonical path. Per-file mounts preserve the
      # attacker's chosen directory shape and keep the harness-framing
      # string `exhibits/` out of the container namespace.
      - ../exhibits/fleet-01/host-2-polyshell/a.php:/var/www/html/pub/media/catalog/product/.cache/a.php:ro
      # access.log is staged at /srv/bl-exhibit/ (:ro), then seeded onto
      # /var/log/apache2/access.log at container start via the entrypoint
      # override below — Apache cannot append to a :ro bind, and the base
      # image's /var/log/apache2/*.log symlinks to /dev/stdout collapse
      # when a regular file is mounted over any of them.
      - ../exhibits/fleet-01/host-2-polyshell/access.log:/srv/bl-exhibit/access.log:ro
      - ../bl-agent:/opt/bl-agent:ro
    # Seed exhibit log into Apache's log dir before starting Apache. The base
    # image ships /var/log/apache2/{access,error,other_vhosts_access}.log as
    # symlinks to /dev/stdout|stderr, which (a) collapse when a regular file
    # is bind-mounted over one of them, and (b) trigger the tar-safety
    # validator on the curator side (symlink escape from the tar root).
    # Replace all three with real writable files — mirrors how a real
    # Debian Apache host ships. Then exec apache2-foreground.
    # NB: docker-compose interpolates `$VAR` at YAML parse time, so shell
    # variables in inline commands must be written as `$$VAR` to pass through.
    command:
      - bash
      - -c
      - |
        set -e
        for f in access.log error.log other_vhosts_access.log; do
          rm -f "/var/log/apache2/$$f"
          : > "/var/log/apache2/$$f"
          chown www-data:www-data "/var/log/apache2/$$f"
        done
        cp /srv/bl-exhibit/access.log /var/log/apache2/access.log
        chown www-data:www-data /var/log/apache2/access.log
        exec apache2-foreground
    networks:
      - fleet
    depends_on:
      - curator

  host-3:
    build:
      context: ..
      dockerfile: compose/host-nginx.Dockerfile
    image: blacklight/host-nginx:dev
    container_name: bl-host-3
    hostname: host-3
    volumes:
      - ../exhibits/fleet-01/host-3-nginx-clean:/usr/share/nginx/html/exhibits:ro
      - ../bl-agent:/opt/bl-agent:ro
    networks:
      - fleet
    depends_on:
      - curator

  host-1:
    build:
      context: ..
      dockerfile: compose/host-apache.Dockerfile
    image: blacklight/host-apache:dev
    container_name: bl-host-1
    hostname: host-1
    volumes:
      - ../exhibits/fleet-01/host-1-anticipatory/access.log:/srv/bl-exhibit/access.log:ro
      - ../bl-agent:/opt/bl-agent:ro
    command:
      - bash
      - -c
      - |
        set -e
        for f in access.log error.log other_vhosts_access.log; do
          rm -f "/var/log/apache2/$$f"
          : > "/var/log/apache2/$$f"
          chown www-data:www-data "/var/log/apache2/$$f"
        done
        cp /srv/bl-exhibit/access.log /var/log/apache2/access.log
        chown www-data:www-data /var/log/apache2/access.log
        exec apache2-foreground
    networks:
      - fleet
    depends_on:
      - curator

  host-4:
    build:
      context: ..
      dockerfile: compose/host-apache.Dockerfile
    image: blacklight/host-apache:dev
    container_name: bl-host-4
    hostname: host-4
    volumes:
      - ../exhibits/fleet-01/host-4-polyshell-second/a.php:/var/www/html/pub/media/catalog/product/cache/.bin/a.php:ro
      - ../exhibits/fleet-01/host-4-polyshell-second/access.log:/srv/bl-exhibit/access.log:ro
      - ../bl-agent:/opt/bl-agent:ro
    command:
      - bash
      - -c
      - |
        set -e
        for f in access.log error.log other_vhosts_access.log; do
          rm -f "/var/log/apache2/$$f"
          : > "/var/log/apache2/$$f"
          chown www-data:www-data "/var/log/apache2/$$f"
        done
        cp /srv/bl-exhibit/access.log /var/log/apache2/access.log
        chown www-data:www-data /var/log/apache2/access.log
        exec apache2-foreground
    networks:
      - fleet
    depends_on:
      - curator

  host-5:
    build:
      context: ..
      dockerfile: compose/host-apache.Dockerfile
    image: blacklight/host-apache:dev
    container_name: bl-host-5
    hostname: host-5
    volumes:
      - ../exhibits/fleet-01/host-5-skimmer/skimmer.php:/var/www/html/pub/media/catalog/product/.cache/skimmer.php:ro
      - ../exhibits/fleet-01/host-5-skimmer/access.log:/srv/bl-exhibit/access.log:ro
      - ../bl-agent:/opt/bl-agent:ro
    command:
      - bash
      - -c
      - |
        set -e
        for f in access.log error.log other_vhosts_access.log; do
          rm -f "/var/log/apache2/$$f"
          : > "/var/log/apache2/$$f"
          chown www-data:www-data "/var/log/apache2/$$f"
        done
        cp /srv/bl-exhibit/access.log /var/log/apache2/access.log
        chown www-data:www-data /var/log/apache2/access.log
        exec apache2-foreground
    networks:
      - fleet
    depends_on:
      - curator

  host-7:
    build:
      context: ..
      dockerfile: compose/host-apache.Dockerfile
    image: blacklight/host-apache:dev
    container_name: bl-host-7
    hostname: host-7
    volumes:
      - ../exhibits/fleet-01/host-7-polyshell-third/a.php:/var/www/html/pub/media/import/.tmp/a.php:ro
      - ../exhibits/fleet-01/host-7-polyshell-third/access.log:/srv/bl-exhibit/access.log:ro
      - ../bl-agent:/opt/bl-agent:ro
    command:
      - bash
      - -c
      - |
        set -e
        for f in access.log error.log other_vhosts_access.log; do
          rm -f "/var/log/apache2/$$f"
          : > "/var/log/apache2/$$f"
          chown www-data:www-data "/var/log/apache2/$$f"
        done
        cp /srv/bl-exhibit/access.log /var/log/apache2/access.log
        chown www-data:www-data /var/log/apache2/access.log
        exec apache2-foreground
    networks:
      - fleet
    depends_on:
      - curator

networks:
  fleet:
    driver: bridge
    name: blacklight-fleet

volumes:
  curator-inbox:
    name: blacklight-curator-inbox
