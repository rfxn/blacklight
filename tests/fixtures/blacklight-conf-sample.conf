# Sample blacklight.conf for fixture-driven test
unattended_mode="1"
notify_channels_enabled="slack,syslog,email"
notify_severity_floor="warn"
lmd_trigger_dedup_window_hours="12"
lmd_conf_path="/usr/local/maldetect/conf.maldet"
cpanel_lockin="force"
cpanel_lockin_timeout_seconds="90"

# Unknown key — should log warning and skip
unknown_key="ignored"

# Malformed (no equals) — should log warning and skip
this is malformed

# Allowlisted key with metacharacter value — should reject with metacharacter warning
lmd_conf_path="value;rm -rf /"
